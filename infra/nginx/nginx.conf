# ─────────────────────────────────────────────
#  Nginx – Reverse Proxy Config
# ─────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;    # allow CSV uploads up to 20 MB

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Rate-limit login endpoint
        location /api/v1/auth/login {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://backend;
        }

        # API docs (dev only – disable in prod via DEBUG=false)
        location /docs {
            proxy_pass http://backend;
        }

        # Frontend (all other routes)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
