# ─────────────────────────────────────────────
#  Nginx – Production Config (HTTPS + HTTP/2)
#  Place TLS certs in infra/nginx/ssl/
#    - ssl/edusentinel.crt  (certificate / fullchain)
#    - ssl/edusentinel.key  (private key)
# ─────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    client_max_body_size 20M;

    # ── Gzip compression ──────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-javascript application/xml
        image/svg+xml font/truetype font/opentype
        application/vnd.ms-fontobject;

    # ── Security headers (global) ─────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Rate-limiting zones ───────────────────
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api_zone:10m   rate=200r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Upstream services ─────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # ── TLS ───────────────────────────────
        ssl_certificate     /etc/nginx/ssl/edusentinel.crt;
        ssl_certificate_key /etc/nginx/ssl/edusentinel.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        limit_conn conn_zone 100;

        # ── API – auth endpoint (strict rate limit) ──
        location = /api/v1/auth/login {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── API ───────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── API docs (disabled in prod unless DEBUG=true) ──
        location ~ ^/(docs|redoc|openapi.json) {
            return 404;
        }

        # ── Next.js static assets (long cache) ──
        location /_next/static/ {
            proxy_pass       http://frontend;
            proxy_set_header Host $host;
            add_header       Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Frontend ─────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
