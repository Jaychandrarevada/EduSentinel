# ─────────────────────────────────────────────
#  EduSentinel – Development Docker Compose
#  Usage: docker compose up --build
# ─────────────────────────────────────────────
version: "3.9"

services:

  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-edusentinel}
      POSTGRES_USER: ${DB_USER:-edu_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-edu_user} -d ${DB_NAME:-edusentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── ML Service ─────────────────────────────
  ml_service:
    build:
      context: ./ml_service
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-edu_user}:${DB_PASSWORD:-strongpassword}@postgres:5432/${DB_NAME:-edusentinel}
      ML_MODEL_STORE_PATH: /app/artifacts
      APP_ENV: development
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ml_artifacts:/app/artifacts
      - ./ml_service:/app       # hot-reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8001/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Backend (FastAPI) ──────────────────────
  backend:
    build:
      context: ./backend
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-edu_user}:${DB_PASSWORD:-strongpassword}@postgres:5432/${DB_NAME:-edusentinel}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml_service:8001
      APP_ENV: development
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot-reload in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Celery Worker ──────────────────────────
  celery_worker:
    build:
      context: ./backend
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-edu_user}:${DB_PASSWORD:-strongpassword}@postgres:5432/${DB_NAME:-edusentinel}
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml_service:8001
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    volumes:
      - ./backend:/app          # shares code with backend service

  # ── Celery Beat (scheduler) ────────────────
  celery_beat:
    build:
      context: ./backend
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ── Frontend (Next.js) ─────────────────────
  frontend:
    build:
      context: ./frontend
      target: deps          # deps stage enables hot-reload
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: EduSentinel
    ports:
      - "3001:3000"         # 3000 reserved for Grafana
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep container node_modules separate
      - /app/.next
    command: npm run dev
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  ml_artifacts:
